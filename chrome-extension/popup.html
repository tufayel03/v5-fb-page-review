<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FB Page Review Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050b18;
      --card-bg: #091124;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #94a3b8;
      
      --color-brand: #0fbc6f;
      --color-brand-glow: rgba(15, 188, 111, 0.15);
      --color-brand-hover: #0da662;
      
      --color-danger: #f43f5e;
      --color-danger-glow: rgba(244, 63, 94, 0.2);
      --color-danger-hover: #e11d48;
      
      --color-warning: #f59e0b;
      --color-warning-glow: rgba(245, 158, 11, 0.2);
      --color-warning-hover: #d97706;

      --color-blue: #3b82f6;
      --color-blue-glow: rgba(59, 130, 246, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    /* Custom scrollbar for a premium look */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    body {
      width: 460px;
      max-height: 600px;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-y: auto;
      padding: 12px;
      font-size: 13.5px;
    }

    .container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--color-brand);
      box-shadow: 0 0 10px var(--color-brand);
    }

    .logo-text {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #2ae08d, var(--color-brand));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .settings-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text-main);
      transform: rotate(30deg);
    }

    /* PREMIUM TABS SWITCHER */
    .tabs-header {
      display: flex;
      background: rgba(5, 11, 24, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 4px;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-muted);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.25s ease-in-out;
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    /* Screen Views */
    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn 0.25s ease-out;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      background: rgba(5, 11, 24, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text-main);
      font-size: 13px;
      transition: all 0.2s ease-in-out;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-brand);
      background: rgba(5, 11, 24, 0.9);
      box-shadow: 0 0 0 3px var(--color-brand-glow);
    }

    textarea#pageDetails, textarea#reviewDesc {
      resize: none;
      height: 75px;
      line-height: 1.45;
    }

    /* High-Fidelity Preview Card */
    .preview-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .preview-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #0f172a;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .preview-info {
      flex: 1;
      overflow: hidden;
    }

    .preview-name {
      font-weight: 750;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-main);
    }

    .preview-url {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row & Grid Buttons */
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      font-weight: 750;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease-in-out;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    /* Golden Amber / Gold Theme */
    .btn-warning {
      background: linear-gradient(135deg, var(--color-warning), var(--color-warning-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-warning-glow);
      flex: 1;
    }
    .btn-warning:hover {
      background: linear-gradient(135deg, #fbbf24, var(--color-warning));
      transform: translateY(-1px);
    }

    /* Emerald green */
    .btn-success {
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-brand-glow);
      flex: 1;
    }
    .btn-success:hover {
      background: linear-gradient(135deg, #2ae08d, var(--color-brand));
      transform: translateY(-1px);
    }

    /* Red / Danger */
    .btn-danger {
      background: linear-gradient(135deg, var(--color-danger), var(--color-danger-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-danger-glow);
      width: 100%;
    }
    .btn-danger:hover {
      background: linear-gradient(135deg, #fb7185, var(--color-danger));
      transform: translateY(-1px);
    }

    /* Blue */
    .btn-info {
      background: linear-gradient(135deg, var(--color-blue), #1d4ed8);
      color: white;
      box-shadow: 0 4px 12px var(--color-blue-glow);
      flex: 1;
    }
    .btn-info:hover {
      background: linear-gradient(135deg, #60a5fa, var(--color-blue));
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      width: 100%;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* EXPERIENCE RADIO PILLS */
    .experience-pills {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .exp-pill {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 8px;
      background: rgba(5, 11, 24, 0.4);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      user-select: none;
    }

    .exp-pill.good.selected {
      border-color: var(--color-brand);
      background: rgba(15, 188, 111, 0.08);
      color: #34d399;
      box-shadow: 0 0 8px rgba(15, 188, 111, 0.15);
    }
    .exp-pill.bad.selected {
      border-color: var(--color-warning);
      background: rgba(245, 158, 11, 0.08);
      color: #fbbf24;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.15);
    }
    .exp-pill.fraud.selected {
      border-color: var(--color-danger);
      background: rgba(244, 63, 94, 0.08);
      color: #f87171;
      box-shadow: 0 0 8px rgba(244, 63, 94, 0.15);
    }

    /* RATING STARS */
    .stars-rating {
      display: flex;
      gap: 5px;
      padding: 6px 10px;
      background: rgba(5, 11, 24, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      width: fit-content;
      margin-bottom: 8px;
    }

    .star-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .star-btn.active {
      color: #fbbf24;
      text-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
    }
    .star-btn:hover {
      transform: scale(1.15);
    }

    /* TOGGLE SWITCH */
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 10px;
    }

    .switch-label-group {
      display: flex;
      flex-direction: column;
    }

    .switch-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-main);
    }

    .switch-desc {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.12);
      transition: .2s;
      border-radius: 18px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--color-brand);
    }

    input:focus + .slider {
      box-shadow: 0 0 1px var(--color-brand);
    }

    input:checked + .slider:before {
      transform: translateX(14px);
    }

    /* Message Alerts */
    .alert {
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 11px;
      display: none;
      animation: fadeIn 0.25s;
    }

    .alert-success {
      background: rgba(15, 188, 111, 0.12);
      border: 1px solid rgba(15, 188, 111, 0.25);
      color: #34d399;
      display: block;
    }

    .alert-danger {
      background: rgba(244, 63, 94, 0.12);
      border: 1px solid rgba(244, 63, 94, 0.25);
      color: #f87171;
      display: block;
    }

    /* Custom Loading Spinner */
    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .non-facebook-alert {
      text-align: center;
      padding: 16px 8px;
    }

    .non-facebook-alert p {
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-dot"></div>
        <div class="logo-text">FB Page Review</div>
      </div>
      <button id="settingsBtn" class="settings-btn" title="Server Settings">⚙️</button>
    </div>

    <!-- Alert Messages -->
    <div id="alertBox" class="alert"></div>

    <!-- Screen 1: Active Facebook Scraper View -->
    <div id="mainView" class="view active">
      <div id="facebookContent">
        <!-- Database Status Indicator -->
        <div id="dbStatusBadge" style="display: none;"></div>

        <!-- Preview Card -->
        <div class="preview-card">
          <img id="pageAvatar" class="preview-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='38' height='38' viewBox='0 0 24 24' fill='none' stroke='%23374151' stroke-width='2'><circle cx='12' cy='12' r='10'/></svg>">
          <div class="preview-info">
            <div id="pageName" class="preview-name">Loading Page Name...</div>
            <div id="pageUrl" class="preview-url">Detecting URL...</div>
          </div>
        </div>

        <!-- Navigation Tabs inside Main Scraper View -->
        <div class="tabs-header">
          <button id="tabScraperBtn" class="tab-btn active">📊 Page Status</button>
          <button id="tabReviewBtn" class="tab-btn">✍️ Write Review</button>
        </div>

        <!-- Tab Content 1: Page Status and Scraper Fields -->
        <div id="tabScraperContent" class="tab-content-view">
          <div class="form-group">
            <label>Phone Number (Scraped/Manual)</label>
            <input type="text" id="contactNumber" placeholder="e.g. 017XXXXXXXX">
          </div>

          <div class="form-group">
            <label>Payment Methods (Comma separated)</label>
            <input type="text" id="paymentMethods" placeholder="e.g. bkash, nagad, rocket">
          </div>

          <div class="form-group">
            <label>Page Details (Notes)</label>
            <textarea id="pageDetails" placeholder="Add custom notes or details..."></textarea>
          </div>

          <!-- Buttons: Page Status updates -->
          <div class="button-group" style="margin-top: 10px;">
            <div class="button-row">
              <button id="addVerifiedBtn" class="btn btn-warning">⭐ Verified Seller</button>
              <button id="addGoldBtn" class="btn btn-info">🏆 Gold Seller</button>
            </div>
            <div class="button-row">
              <button id="addReviewBtn" class="btn btn-success">🔍 Under Review</button>
              <button id="addSuspiciousBtn" class="btn btn-warning" style="filter: hue-rotate(-20deg);">⚠️ Suspicious</button>
            </div>
            <button id="addFraudBtn" class="btn btn-danger">🛑 Report as FRAUD</button>
          </div>
        </div>

        <!-- Tab Content 2: Write Review/Report Form -->
        <div id="tabReviewContent" class="tab-content-view" style="display: none;">
          <!-- 1. Experience Type Selection Pills -->
          <div class="form-group">
            <label>Experience Type</label>
            <div class="experience-pills">
              <div id="expPillGood" class="exp-pill good selected" data-type="Good">😇 Good</div>
              <div id="expPillBad" class="exp-pill bad" data-type="Bad">😟 Bad</div>
              <div id="expPillFraud" class="exp-pill fraud" data-type="Fraud Report">🚨 Fraud</div>
            </div>
          </div>

          <!-- 2. Star Rating Selector -->
          <div class="form-group">
            <label>Rate experience</label>
            <div class="stars-rating" id="starsRatingContainer">
              <button type="button" class="star-btn active" data-rating="1">★</button>
              <button type="button" class="star-btn active" data-rating="2">★</button>
              <button type="button" class="star-btn active" data-rating="3">★</button>
              <button type="button" class="star-btn active" data-rating="4">★</button>
              <button type="button" class="star-btn active" data-rating="5">★</button>
            </div>
          </div>

          <!-- 3. Title input -->
          <div class="form-group">
            <label>Review Title</label>
            <input type="text" id="reviewTitle" placeholder="e.g. Received bad quality service">
          </div>

          <!-- 4. Date of Experience input -->
          <div class="form-group">
            <label>Date of Experience</label>
            <input type="date" id="reviewDate">
          </div>

          <!-- 5. Describe what happened textarea -->
          <div class="form-group">
            <label>Describe what happened</label>
            <textarea id="reviewDesc" placeholder="Provide exact details of order, transaction, or fraud..."></textarea>
          </div>

          <!-- 6. Payment details (Optional) -->
          <div class="button-row">
            <div class="form-group" style="flex: 1;">
              <label>bKash/Nagad Number</label>
              <input type="text" id="reviewBkash" placeholder="e.g. 01XXXXXXXXX">
            </div>
            <div class="form-group" style="flex: 1;">
              <label>Facebook Post Link</label>
              <input type="text" id="reviewPostLink" placeholder="Proof url...">
            </div>
          </div>

          <!-- 7. Write On Behalf (Switch - only shown if logged in) -->
          <div class="switch-row">
            <div class="switch-label-group">
              <span class="switch-title">👥 Write Review On Behalf</span>
              <span class="switch-desc">Submit review on behalf of someone else</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="reviewOnBehalf" checked>
              <span class="slider"></span>
            </label>
          </div>

          <!-- 7b. Custom Reviewer Name (Optional) -->
          <div class="form-group" id="onBehalfNameGroup" style="display: block; margin-top: 8px;">
            <label>Custom Reviewer Name (Optional)</label>
            <input type="text" id="onBehalfName" placeholder="e.g. John Doe (defaults to 'On behalf')">
          </div>

          <!-- Submit Review Button -->
          <button id="submitReviewBtn" class="btn btn-success" style="width: 100%; margin-top: 4px;">🚀 Submit Review</button>
        </div>

      </div>

      <!-- Alert if not on a facebook tab -->
      <div id="nonFacebookContent" style="display: none;" class="non-facebook-alert">
        <p>Please open a Facebook Page tab (e.g. facebook.com/pagename) to use the scraper assistant!</p>
        <button id="openFbBtn" class="btn btn-primary">Open Facebook</button>
      </div>
    </div>

    <!-- Screen 2: Server & Authentication Settings -->
    <div id="settingsView" class="view">
      <h3 style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">Server Settings</h3>
      
      <div class="form-group">
        <label>Server URL</label>
        <input type="url" id="serverUrl" value="https://fbpagereview.com">
      </div>

      <div class="form-group">
        <label>Admin Username / Email</label>
        <input type="text" id="adminUser" placeholder="Enter username or email">
      </div>

      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="adminPass" placeholder="Enter password">
      </div>

      <div class="button-group" style="margin-top: 12px;">
        <button id="saveSettingsBtn" class="btn btn-primary" style="margin-bottom: 8px;">Save & Connect</button>
        <button id="backToMainBtn" class="btn btn-secondary">Back</button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
