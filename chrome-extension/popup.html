<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FB Page Review Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #050b18; /* Official website theme background color */
      --card-bg: #091124; /* Official website card background color */
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #94a3b8;
      
      --color-brand: #0fbc6f; /* Official website brand emerald green color */
      --color-brand-glow: rgba(15, 188, 111, 0.25);
      --color-brand-hover: #0da662;
      
      --color-danger: #f43f5e; /* Official website rose red color */
      --color-danger-glow: rgba(244, 63, 94, 0.3);
      --color-danger-hover: #e11d48;
      
      --color-warning: #f59e0b; /* Golden Amber */
      --color-warning-glow: rgba(245, 158, 11, 0.25);
      --color-warning-hover: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      width: 380px;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden; /* ABSOLUTELY NO SCROLLBAR */
      padding: 12px;
      font-size: 13px;
    }

    /* Premium glassmorphism container matching homepage theme */
    .container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-brand);
      box-shadow: 0 0 10px var(--color-brand);
    }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #2ae08d, var(--color-brand));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .settings-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text-main);
      transform: rotate(30deg);
    }

    /* Screen Views */
    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn 0.25s ease-out;
    }

    /* Compact Form Styles */
    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      background: rgba(5, 11, 24, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text-main);
      font-size: 12px;
      transition: all 0.2s ease-in-out;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--color-brand);
      background: rgba(5, 11, 24, 0.9);
      box-shadow: 0 0 0 3px var(--color-brand-glow);
    }

    /* Bigger Page Details Field as requested */
    textarea#pageDetails {
      resize: none;
      height: 64px; /* Taller area to easily type multi-line comments! */
      line-height: 1.4;
    }

    /* High-Fidelity Preview Card */
    .preview-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .preview-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #0f172a;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .preview-info {
      flex: 1;
      overflow: hidden;
    }

    .preview-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-main);
    }

    .preview-url {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* PREMIUM ROW & GRID BUTTON LAYOUT */
    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease-in-out;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    /* Verified Marketplace Button (Gold Theme) */
    .btn-warning {
      background: linear-gradient(135deg, var(--color-warning), var(--color-warning-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-warning-glow);
      flex: 1;
    }

    .btn-warning:hover {
      background: linear-gradient(135deg, #fbbf24, var(--color-warning));
      transform: translateY(-1px);
    }

    /* Under Review Button (Emerald Brand Green Theme) */
    .btn-success {
      background: linear-gradient(135deg, var(--color-brand), var(--color-brand-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-brand-glow);
      flex: 1;
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #2ae08d, var(--color-brand));
      transform: translateY(-1px);
    }

    /* Fraud Button (Destructive Brand Rose Theme) */
    .btn-danger {
      background: linear-gradient(135deg, var(--color-danger), var(--color-danger-hover));
      color: white;
      box-shadow: 0 4px 12px var(--color-danger-glow);
      width: 100%;
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, #fb7185, var(--color-danger));
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      width: 100%;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Message Alerts */
    .alert {
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 11px;
      display: none;
      animation: fadeIn 0.25s;
    }

    .alert-success {
      background: rgba(15, 188, 111, 0.12);
      border: 1px solid rgba(15, 188, 111, 0.25);
      color: #34d399;
      display: block;
    }

    .alert-danger {
      background: rgba(244, 63, 94, 0.12);
      border: 1px solid rgba(244, 63, 94, 0.25);
      color: #f87171;
      display: block;
    }

    /* Custom Loading Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .non-facebook-alert {
      text-align: center;
      padding: 16px 8px;
    }

    .non-facebook-alert p {
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-dot"></div>
        <div class="logo-text">FB Page Assistant</div>
      </div>
      <button id="settingsBtn" class="settings-btn" title="Server Settings">⚙️</button>
    </div>

    <!-- Alert Messages -->
    <div id="alertBox" class="alert"></div>

    <!-- Screen 1: Active Facebook Scraper View -->
    <div id="mainView" class="view active">
      <div id="facebookContent">
        <!-- Database Status Indicator -->
        <div id="dbStatusBadge" style="display: none;"></div>

        <!-- Preview Card -->
        <div class="preview-card">
          <img id="pageAvatar" class="preview-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='42' height='42' viewBox='0 0 24 24' fill='none' stroke='%23374151' stroke-width='2'><circle cx='12' cy='12' r='10'/></svg>">
          <div class="preview-info">
            <div id="pageName" class="preview-name">Loading Page Name...</div>
            <div id="pageUrl" class="preview-url">Detecting URL...</div>
          </div>
        </div>

        <!-- Inputs to review/modify scraped data -->
        <div class="form-group">
          <label>Phone Number (Scraped/Manual)</label>
          <input type="text" id="contactNumber" placeholder="e.g. +88017XXXXXXXX">
        </div>

        <div class="form-group">
          <label>Payment Methods (Comma separated)</label>
          <input type="text" id="paymentMethods" placeholder="e.g. bkash, nagad, rocket">
        </div>

        <div class="form-group">
          <label>Page Details (Notes)</label>
          <textarea id="pageDetails" rows="3" placeholder="Add custom notes or details..."></textarea>
        </div>

        <!-- Buttons: Optimized Grid Layout to Completely Remove Scrollbar -->
        <div class="button-group" style="margin-top: 12px;">
          <!-- Positive Actions (Side-by-Side) -->
          <div class="button-row">
            <button id="addVerifiedBtn" class="btn btn-warning">
              ⭐ Verified Seller
            </button>
            <button id="addReviewBtn" class="btn btn-success">
              🔍 Under Review
            </button>
          </div>
          
          <!-- Destructive Action (Full Width) -->
          <button id="addFraudBtn" class="btn btn-danger">
            🛑 Report as FRAUD
          </button>
        </div>
      </div>

      <!-- Alert if not on a facebook tab -->
      <div id="nonFacebookContent" style="display: none;" class="non-facebook-alert">
        <p>Please open a Facebook Page tab (e.g. facebook.com/pagename) to use the scraper assistant!</p>
        <button id="openFbBtn" class="btn btn-primary">Open Facebook</button>
      </div>
    </div>

    <!-- Screen 2: Server & Authentication Settings -->
    <div id="settingsView" class="view">
      <h3 style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">Server Settings</h3>
      
      <div class="form-group">
        <label>Server URL</label>
        <input type="url" id="serverUrl" value="https://fbpagereview.com">
      </div>

      <div class="form-group">
        <label>Admin Username / Email</label>
        <input type="text" id="adminUser" placeholder="Enter username or email">
      </div>

      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="adminPass" placeholder="Enter password">
      </div>

      <div class="button-group" style="margin-top: 12px;">
        <button id="saveSettingsBtn" class="btn btn-primary" style="margin-bottom: 8px;">Save & Connect</button>
        <button id="backToMainBtn" class="btn btn-secondary">Back</button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
